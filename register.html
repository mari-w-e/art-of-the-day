<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Картина дня</a>
  </nav>

  <div class="container">
    <div class="form-card">
      <h1>Регистрация</h1>
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="username" placeholder="Ваше имя">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">Создать аккаунт</button>
      <div class="error-message" id="error"></div>
      <div style="margin-top: 16px; font-size: 13px; color: #888;">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </div>
    </div>
  </div>

  <script src="js/paintings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    function handleRegister() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = register(username, email, password);
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').textContent = result.message;
      }
    }
  </script>
</body>
</html>
