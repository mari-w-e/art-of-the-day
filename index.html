<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Картина дня</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Картина дня</a>
    <div class="nav-links" id="nav-auth">
      <a href="login.html">Войти</a>
      <a href="register.html">Регистрация</a>
    </div>
    <div class="nav-links" id="nav-user" style="display:none">
      <span id="nav-username"></span>
      <a href="cabinet.html">Мой кабинет</a>
      <a href="#" onclick="logout()">Выйти</a>
    </div>
  </nav>

  <div class="container">
    <div class="painting-card" id="painting-card"></div>
  </div>

  <script src="js/paintings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    updateNav();
    const painting = getTodayPainting();
    const user = getCurrentUser();

    if (user) {
      saveToHistory(user.id, painting.id);
    }

    document.getElementById('painting-card').innerHTML = `
      <img src="${painting.imageUrl}" alt="${painting.title}">
      <div class="painting-info">
        <div class="painting-title">${painting.title}</div>
        <div class="painting-artist">${painting.artist}, ${painting.year}</div>
        <div class="painting-description">${painting.description}</div>
        <div class="painting-story">${painting.story}</div>
        ${!user ? '<div class="guest-notice">Войдите в аккаунт, чтобы сохранять историю просмотров</div>' : ''}
      </div>
    `;
  </script>
</body>
</html>
