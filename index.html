<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Картина дня</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Картина дня</a>
    <div class="nav-links" id="nav-auth">
      <a href="login.html">Войти</a>
      <a href="register.html">Регистрация</a>
    </div>
    <div class="nav-links" id="nav-user" style="display:none">
      <span id="nav-username"></span>
      <a href="cabinet.html">Мой кабинет</a>
      <a href="#" onclick="logout()">Выйти</a>
    </div>
  </nav>

  <div class="container">
    <div class="painting-card" id="painting-card"></div>
  </div>

  <script src="js/paintings.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    App.updateNav();
    const painting = App.getTodayPainting();
    const user = Auth.getCurrentUser();

    if (user) {
      App.recordView(user.id, painting.id);
    }

    App.renderPaintingCard(painting, 'painting-card', { guestNotice: true });
  </script>
</body>
</html>
