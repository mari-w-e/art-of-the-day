<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой кабинет</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Картина дня</a>
    <div class="nav-links" id="nav-auth">
      <a href="login.html">Войти</a>
    </div>
    <div class="nav-links" id="nav-user" style="display:none">
      <span id="nav-username"></span>
      <a href="cabinet.html">Мой кабинет</a>
      <a href="#" onclick="logout()">Выйти</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">История просмотров</div>
    <div class="page-subtitle" id="subtitle"></div>
    <div id="gallery"></div>
  </div>

  <script src="js/paintings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    updateNav();
    const user = getCurrentUser();

    if (!user) {
      window.location.href = 'login.html';
    } else {
      const history = getViewHistory(user.id);
      const galleryEl = document.getElementById('gallery');
      const subtitleEl = document.getElementById('subtitle');

      subtitleEl.textContent = `Привет, ${user.username}! Вы просмотрели ${history.length} картин`;

      if (history.length === 0) {
        galleryEl.innerHTML = '<div class="empty-state">Вы ещё не просмотрели ни одной картины.<br>Вернитесь на главную страницу.</div>';
      } else {
        const items = history.map(h => {
          const p = getPaintingById(h.paintingId);
          if (!p) return '';
          return `
            <a href="painting.html?id=${p.id}" class="gallery-item">
              <img src="${p.imageUrl}" alt="${p.title}">
              <div class="gallery-item-info">
                <div class="gallery-item-title">${p.title}</div>
                <div class="gallery-item-artist">${p.artist}, ${p.year}</div>
              </div>
            </a>
          `;
        }).join('');
        galleryEl.innerHTML = `<div class="gallery">${items}</div>`;
      }
    }
  </script>
</body>
</html>
