<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой кабинет</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Картина дня</a>
    <div class="nav-links" id="nav-auth">
      <a href="login.html">Войти</a>
    </div>
    <div class="nav-links" id="nav-user" style="display:none">
      <span id="nav-username"></span>
      <a href="cabinet.html">Мой кабинет</a>
      <a href="#" onclick="logout()">Выйти</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">Мой кабинет</div>
    <div class="page-subtitle" id="subtitle"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('history')">История просмотров</button>
      <button class="tab-btn" onclick="showTab('favorites')">Избранное</button>
    </div>

    <div id="tab-history">
      <div id="gallery-history"></div>
    </div>
    <div id="tab-favorites" style="display:none">
      <div id="gallery-favorites"></div>
    </div>
  </div>

  <script src="js/paintings.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    App.updateNav();
    const user = Auth.getCurrentUser();

    if (!user) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('subtitle').textContent =
        `Привет, ${user.username}!`;

      renderGallery('gallery-history', App.getHistory(user.id), 'Вы ещё не просмотрели ни одной картины.');
      renderGallery('gallery-favorites', App.getFavorites(user.id), 'В избранном пока пусто.');
    }

    function renderGallery(containerId, items, emptyText) {
      const el = document.getElementById(containerId);
      if (items.length === 0) {
        el.innerHTML = `<div class="empty-state">${emptyText}</div>`;
        return;
      }
      const cards = items.map(p => `
        <a href="painting.html?id=${p.id}" class="gallery-item">
          <img src="${p.imageUrl}" alt="${p.title}">
          <div class="gallery-item-info">
            <div class="gallery-item-title">${p.title}</div>
            <div class="gallery-item-artist">${p.artist}, ${p.year}</div>
          </div>
        </a>
      `).join('');
      el.innerHTML = `<div class="gallery">${cards}</div>`;
    }

    function showTab(name) {
      document.getElementById('tab-history').style.display = name === 'history' ? '' : 'none';
      document.getElementById('tab-favorites').style.display = name === 'favorites' ? '' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0) === (name === 'history'));
      });
    }
  </script>
</body>
</html>
